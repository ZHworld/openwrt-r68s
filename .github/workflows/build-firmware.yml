name: R68S Build

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y build-essential git wget curl gawk

      - name: Clone LEDE
        run: |
          git clone --depth=1 https://github.com/coolsnowwolf/lede openwrt
          cd openwrt
          ./scripts/feeds update -a && ./scripts/feeds install -a

      - name: Configure
        run: |
          cd openwrt
          cat > .config <<'EOF'
CONFIG_TARGET_armvirt=y
CONFIG_TARGET_armvirt_64=y
CONFIG_TARGET_armvirt_64_Default=y
CONFIG_TARGET_ROOTFS_TARGZ=y
EOF
          make defconfig

      - name: Download
        run: cd openwrt && make download -j$(nproc) 2>&1 | tail -5

      - name: Build
        run: cd openwrt && make -j$(nproc) 2>&1 | tail -20
        timeout-minutes: 180

      - name: Package
        uses: ophub/flippy-openwrt-actions@main
        env:
          OPENWRT_ARMSR: openwrt/bin/targets/*/*/*.tar.gz
          PACKAGE_SOC: r68s
          KERNEL_VERSION_NAME: 6.12.y
          OPENWRT_IP: 192.168.20.1
          GZIP_IMGS: .gz

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: R68S-OpenWrt-firmware
          path: /opt/openwrt_packit/output/*.img.gz
          retention-days: 30
