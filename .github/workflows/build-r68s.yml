name: Build R68S OpenWrt

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: Kernel version
        required: true
        default: '6.12.y'
      openwrt_ip:
        description: Router IP
        required: true
        default: '192.168.20.1'

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: Clone LEDE
        run: |
          git clone --depth=1 https://github.com/coolsnowwolf/lede openwrt
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure
        run: |
          cd openwrt
          cat > .config <<'EOF'
CONFIG_TARGET_armvirt=y
CONFIG_TARGET_armvirt_64=y
CONFIG_TARGET_armvirt_64_Default=y
CONFIG_TARGET_ROOTFS_TARGZ=y
CONFIG_BINARY_FOLDER="bin"
CONFIG_DOWNLOAD_FOLDER="dl"
CONFIG_CCACHE=y
CONFIG_LUCI_LANG_zh_Hans=y
EOF
          make defconfig

      - name: Download sources
        run: |
          cd openwrt
          make download -j$(nproc) 2>&1 | tail -10

      - name: Build rootfs
        run: |
          cd openwrt
          make -j$(nproc) 2>&1 | tail -20
        timeout-minutes: 180

      - name: Find rootfs
        id: find_rootfs
        run: |
          ROOTFS=$(find openwrt/bin/targets -name "*rootfs.tar.gz" | head -1)
          echo "ROOTFS_PATH=$ROOTFS" >> $GITHUB_OUTPUT
          ls -lh "$ROOTFS"

      - name: Package with Flippy
        uses: ophub/flippy-openwrt-actions@main
        env:
          OPENWRT_ARMSR: ${{ steps.find_rootfs.outputs.ROOTFS_PATH }}
          PACKAGE_SOC: r68s
          KERNEL_VERSION_NAME: ${{ github.event.inputs.kernel_version || '6.12.y' }}
          OPENWRT_IP: ${{ github.event.inputs.openwrt_ip || '192.168.20.1' }}
          GZIP_IMGS: .gz

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: R68S-OpenWrt-${{ github.event.inputs.kernel_version || '6.12.y' }}-${{ github.run_number }}
          path: /opt/openwrt_packit/output/*.img.gz
          retention-days: 30
